<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - BorrowSmart</title>

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="admin.js" defer></script>

</head>

<body>

<div class="container container-wide">

<h1>BorrowSmart Admin Dashboard</h1>

<!-- STATS -->
<div class="stats-grid">

<div class="stat-card">
<div class="stat-value" id="totalAssets">0</div>
<div>Total Assets</div>
</div>

<div class="stat-card">
<div class="stat-value" id="borrowedAssets">0</div>
<div>Borrowed</div>
</div>

<div class="stat-card">
<div class="stat-value" id="availableAssets">0</div>
<div>Available</div>
</div>

</div>

<br>

<!-- SEARCH -->
<input type="text" id="search" placeholder="Search assets..." onkeyup="searchInventory()">

<br><br>

<!-- INVENTORY TABLE -->
<div class="table-container">

<table border="1" width="100%">

<thead>
<tr>
<th>Asset ID</th>
<th>Name</th>
<th>Status</th>
<th>Holder</th>
</tr>
</thead>

<tbody id="assetBody">

</tbody>

</table>

</div>

<br>

<!-- ACTION BUTTONS -->

<button onclick="showAddAssetModal()">Add Asset</button>

<button onclick="printReport()">Print Report</button>

<button onclick="downloadCSV()">Download CSV</button>


<!-- ADD ASSET POPUP -->

<div id="addAssetPopup" class="popup" style="display:none;">

<div class="popupContent">

<h3>Add New Asset</h3>

<form onsubmit="addAsset(event)">

<label>Asset Name</label>
<input type="text" id="assetName" required>

<label>Category</label>
<select id="category">

<option value="Electronics">Electronics</option>
<option value="Key">Key</option>
<option value="Equipment">Equipment</option>

</select>

<label>Location</label>
<input type="text" id="location">

<br><br>

<button type="submit">Add</button>

<button type="button" onclick="closeAddAssetPopup()">Cancel</button>

</form>

</div>

</div>


</div>


<script>

function showAddAssetModal(){
document.getElementById("addAssetPopup").style.display="block"
}

function closeAddAssetPopup(){
document.getElementById("addAssetPopup").style.display="none"
}

</script>


</body>
</html>
