<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Office Key Scanner</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script src="config.js"></script>
<script src="app.js" defer></script>

<style>
*{ box-sizing:border-box; }

body{
  font-family:Arial, sans-serif;
  margin:0;
  padding:0;
  background:#0f172a;
  color:#f1f5f9;
  text-align:center;
}

/* container */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* title */
h2{
  margin-bottom:10px;
  font-weight:600;
}

/* login button placeholder */
#login{
  margin:15px auto;
  display:flex;
  justify-content:center;
}

/* scanner */
#scanner{
  width:100%;
  max-width:350px;
  margin:auto;
  border-radius:12px;
  overflow:hidden;
  background:#1e293b;
  min-height:300px; /* ensure visible before camera loads */
  margin-top:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

/* scan result */
.scanResult{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.scanResult:hover{
  transform:scale(1.02);
}

.scanResult p{
  margin:0;
  opacity:0.7;
}

.scanResult h3{
  margin:5px 0;
  font-size:24px;
  color:#38bdf8;
}

/* buttons */
.actions{
  margin-top:15px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
  font-weight:bold;
}

/* borrow */
.borrowBtn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
}
.borrowBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #22c55e;
}

/* return */
.returnBtn{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:white;
}
.returnBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #ef4444;
}

/* login text */
#userInfo{
  font-size:14px;
  margin-bottom:10px;
  color:#94a3b8;
}

/* status */
#status{
  margin-top:10px;
  font-size:14px;
  color:#38bdf8;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);
}

/* popup box */
.popupContent{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:90%;
  max-width:320px;
  margin:180px auto;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  animation:popupAnim 0.3s ease;
}

/* popup animation */
@keyframes popupAnim{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

/* popup buttons */
.popupContent button{
  margin-top:10px;
}
.popupContent button:first-of-type{
  background:#64748b;
  color:white;
}
.popupContent button:last-of-type{
  background:#22c55e;
  color:white;
}

/* responsive */
@media (max-width:480px){
  h2{ font-size:20px; }
  button{ font-size:15px; padding:12px; }
  .scanResult h3{ font-size:20px; }
}
</style>
</head>

<body>
<div class="container">
<h2>🔑 Office Key Scanner</h2>

<!-- Google Sign-In -->
<div id="login"></div>
<p id="userInfo"></p>

<!-- QR Scanner -->
<div id="scanner"></div>

<div class="scanResult">
<p>Scanned Asset</p>
<h3 id="assetID">None</h3>
</div>

<div class="actions">
<button class="borrowBtn" onclick="confirmBorrow()">Borrow</button>
<button class="returnBtn" onclick="returnAsset()">Return</button>
</div>

<p id="status"></p>
</div>

<!-- popup -->
<div id="borrowPopup" class="popup">
<div class="popupContent">
<h3>Confirm Borrow</h3>
<p>Asset: <span id="popupAsset"></span></p>
<button onclick="closePopup()">Cancel</button>
<button onclick="borrowAsset()">Confirm</button>
</div>
</div>

</body>
</html>
